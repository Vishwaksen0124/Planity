version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7
    container_name: planity-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: planity
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - planity-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: planity-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - planity-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Backend Server
  server:
    build:
      context: ./Server
      dockerfile: Dockerfile
    container_name: planity-server
    restart: unless-stopped
    ports:
      - "8800:8800"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=8800
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongodb:27017/planity}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:80,https://planity-1.onrender.com}
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - planity-network
    volumes:
      - ./Server/logs:/app/logs

  # Frontend Client
  client:
    build:
      context: ./Client
      dockerfile: Dockerfile
      args:
        - VITE_APP_BASE_URL=${VITE_APP_BASE_URL:-http://localhost:8800}
        - VITE_APP_FIREBASE_API_KEY=${VITE_APP_FIREBASE_API_KEY}
    container_name: planity-client
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - planity-network

networks:
  planity-network:
    driver: bridge

volumes:
  mongodb_data:
  redis_data:
